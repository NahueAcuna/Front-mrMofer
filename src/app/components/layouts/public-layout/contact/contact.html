<div class="principal-container">
  <h2>Ponerse en Contacto</h2>
  <p id="hero">Contactate con nosotros desde cualquier medio</p>

  <div class="contact-area">
    <div class="contacts">
      <h3>Información de Contacto</h3>
      <div class="contact">
        <span class="material-symbols-outlined"> call </span>
        <div class="info">
            <h4>Telefono</h4>
            <p>12345678</p>
            <p>Disponibles de 07:00 hs - 18:00 hs</p>
        </div>
      </div>
      <div class="contact">
        <span class="material-symbols-outlined"> mail </span>

        <div class="info">
            <h4>Email</h4>
            <p>mr.mofer@gmail.com</p>
            <p>Te responderemos lo antes posible</p>
        </div>
      </div>
      <div class="contact">
        <span class="material-symbols-outlined"> location_on </span>

        <div class="info">
            <h4>Area de servicio</h4>
            <p>Santa clara del Mar - Marchiquita</p>
        </div>
      </div>
    </div>
    <form action="">
      <div class="input-form">

        <label for="name">Nombre</label>
        <input type="text" id="name" placeholder="Tu nombre"/>
      </div>

      <div class="input-form">

        <label for="email">Email</label>
        <input type="text" id="email" placeholder="tu@gmail.com"/>

      </div>

      <div class="input-form">

        <label for="phone">Teléfono</label>
        <input type="text" id="phone" placeholder="2233067454"/>

      </div>

      <div class="input-form">

        <label for="mesegge">Mensaje</label>
        <input type="text" id="mesegge" placeholder="Despejá tus dudas..."/>
      </div>

      <button type="submit">Enviar Mensage</button>
    </form>
  </div>
</div>
